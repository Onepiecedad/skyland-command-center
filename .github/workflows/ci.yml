name: CI

# Kör alla enhets-/integrationstester automatiskt vid varje push och pull request.
# Två jobb (backend + frontend) körs parallellt. E2E (Playwright) ingår INTE här —
# det kräver en körande app + operatörslösenord och läggs till som ett separat steg.

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend-tester
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend:
    name: Frontend-tester
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
